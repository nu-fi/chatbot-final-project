{% extends "layouts/base_dashboard.html" %}

{% block content %}
<div class="container">
    <table id="data" class="table table-striped table-hover">
        <thead>
            <tr>
                <th scope="col">Pertanyaan</th>
                <th scope="col">Aksi</th>
            </tr>
            </thead>
            <tbody>
            {% for m in messages %}
            <tr>
                <th>{{ m.question }}</th>
                <th>
                    <div>

                        <button class="btn btn-danger btn-md rounded-0" type="button" data-placement="top" title="Delete" data-bs-toggle="modal" data-bs-target="#deleteModal{{m.id}}"><i class='bx bx-trash'></i></button>

                        <!-- Delete Modal -->
                        <div class="modal" id="deleteModal{{m.id}}" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
                            <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="deleteModalLabel">Hapus Kategori Berita</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>

                                <div class="modal-body">
                                    <p>Apakah yakin ingin menghapus {{ m.question }}?</p>
                                </div>

                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    
                                    <form action="{{ url_for('chatbot.quest_delete', id=m.id) }}" method="POST">
                                        <input type="submit" class="btn btn-danger" value="Delete">
                                    </form>
                                </div>
                            </div>
                            </div>
                        </div>
                    </div>
                </th>
            </tr>
            
            {% endfor %}
            </tbody>
    </table>
</div>
    
{% endblock content%}
