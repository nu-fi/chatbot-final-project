{% extends "layouts/base_dashboard.html" %}

{% block header %}
<div class="container">
    <h1> {{ title }}</h1>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary float-right" data-toggle="modal" data-target="#modalll">
        <i class="fa-solid fa-circle-info"></i>&nbsp;Lihat Petunjuk
    </button>

    <!-- Modal -->
    <div class="modal fade" id="modalll" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Petunjuk Pengelolaan Data {{ title }}</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>          
          <div class="modal-body">
            ?????
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
</div>
{% endblock header %}

{% block content %}

<div class="container">
  <div class="row">
    <div class="col-12 col-md-12 col-lg-12">
      <div class="card">
        <section class="section m-4">
          <!-- <p>{{ summary }} </p> -->
          <table id="data" class="table table-striped table-hover">
            <thead>
                <tr>
                  <th scope="col">Histori Percakapan</th>
                  <th scope="col">Tanggal Percakapan</th>
                  <!-- <th scope="col">Responses</th> -->
                </tr>
              </thead>
              <tbody>
              
              </tbody>
                
          </table>
        </section>
      </div>
    </div>
  </div>
</div>
{% endblock content%}
