{% extends "layouts/base_dashboard.html" %}

{% block header %}
<div class="container">
    <h1> {{ title }}</h1>
    
</div>
{% endblock header %}

{% block content %}
<div class="row">
  <div class="col-lg-3 col-md-6 col-sm-6 col-12">
    <div class="card card-statistic-1">
      <div class="card-icon bg-primary">
        <i class="far fa-user"></i>
      </div>
      <div class="card-wrap">
        <div class="card-header">
          <h4>Total Data Dokter</h4>
        </div>
        <div class="card-body">
          {{ num_datadok }}
        </div>
      </div>
    </div>
  </div>
  <div class="col-lg-3 col-md-6 col-sm-6 col-12">
    <div class="card card-statistic-1">
      <div class="card-icon bg-success">
        <i class="fas fa-circle"></i>
      </div>
      <div class="card-wrap">
        <div class="card-header">
          <h4>Total Akun Dokter</h4>
        </div>
        <div class="card-body">
          {{ num_dok }}
        </div>
      </div>
    </div>
  </div>                  
</div>

{% endblock content%}

{% block scripts %}
{% endblock %}
