{% extends "layouts/base.html" %}

{% block content %}

<h3 class="text-center text-2xl font-bold hover:text-gray-700 pt-4">Galeri {{gall.title}}</h3>
<p class="text-center">Published on {{gall.date_posted.strftime("%d %B, %Y")}}</p>

<div class="container mx-auto flex items-center flex-wrap pt-1 pb-12">
    <div class="flex flex-wrap justify-center pt-4 -mx-6">
        {% for i in imgs %}
        <div class="w-full md:w-1/3 xl:w-1/4 p-6 flex flex-col">                
            <img class="hover:grow hover:shadow-lg" src="{{url_for('static', filename='assets/img/galleries/' + i.image_gallery )}}">
        </div>
        {% endfor %}

    </div>
</div>
{% endblock content%}
