{% extends "layouts/base.html" %}

{% block content %}

<div class="">
  <section class="pb-6 text-gray-900">
    <div class="container flex flex-col items-center justify-center p-4 mx-auto sm:p-10">
        <h1 class="text-4xl font-bold leading-none text-center sm:text-5xl">Galeri {{gall.title}}</h1>
        <p class="p-2 text-sm font-medium tracking-wider text-center uppercase">Published on {{gall.date_posted.strftime("%d %B, %Y")}}</p>

        <section class="text-gray-600 body-font">
          <div class="container px-5 pb-24 pt-12 mx-auto">
            
            <div class="flex flex-wrap -m-4">
              {% for i in imgs %}
              <div class="lg:w-1/3 sm:w-1/2 p-4">
                <div class="flex relative">
                  <img alt="gallery" class="absolute inset-0 w-full h-full object-cover object-center" src="{{url_for('static', filename='assets/img/galleries/' + i.image_gallery )}}">
                  <div class="px-8 py-10 relative z-10 w-full border-4 border-gray-200 bg-white opacity-0 hover:opacity-100">
                    <h2 class="tracking-widest text-sm title-font font-medium text-indigo-500 mb-1">THE SUBTITLE</h2>
                    <h1 class="title-font text-lg font-medium text-gray-900 mb-3">{{gall.title}}</h1>
                    <p class="leading-relaxed">{{i.description}}</p>
                  </div>
                </div>
              </div>
              {% endfor %}
            </div>
          </div>
        </section>
        
    </div>
  </section>
</div>
